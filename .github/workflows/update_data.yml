name: Update Occupancy Data

on:
  schedule:
    - cron: '0 10 * * 6'  # 2:00 AM PST Saturday night / Sunday morning
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install pymongo

      - name: Create output directories
        run: mkdir -p JWC BFit KREC

      - name: Run exporter
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python src/export.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add JWC/jwc_data.json JWC/meta.json BFit/bfit_data.json BFit/meta.json KREC/krec_data.json KREC/meta.json
          git diff --staged --quiet || git commit -m "chore: update occupancy data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push